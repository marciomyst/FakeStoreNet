version: '3.8'

services:
  api:
    image: fakestorenet/api:latest
    build:
      context: ../../
      dockerfile: src/FakeStoreNet.Api/Dockerfile
    ports:
      - "5000:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=db;Database=FakeStoreDb;Username=postgres;Password=YourPassword!
    depends_on:
      - db

  db:
    image: postgres:14-alpine
    environment:
      - POSTGRES_DB=FakeStoreDb
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=YourPassword!
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
